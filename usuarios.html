<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>

    <!-- Firebase v9 Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        header h1 {
            font-size: 28px;
            font-weight: bold;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary {
            background: #17a2b8;
            color: white;
        }

        .btn-primary:hover {
            background: #138496;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .content {
            padding: 30px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filters input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        h2 {
            margin: 30px 0 20px 0;
            color: #333;
            font-size: 20px;
        }

        .usuarios-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .usuarios-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .usuarios-table th,
        .usuarios-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .usuarios-table th {
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        .usuarios-table tbody tr {
            transition: background-color 0.2s;
        }

        .usuarios-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .usuarios-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-ativo {
            background: #d4edda;
            color: #155724;
        }

        .status-desativado {
            background: #f8d7da;
            color: #721c24;
        }

        .status-pendente {
            background: #fff3cd;
            color: #856404;
        }

        .actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #007bff;
            color: white;
        }

        .btn-edit:hover {
            background: #0056b3;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-password {
            background: #6c3fb5;
            color: white;
        }

        .btn-password:hover {
            background: #5a2f8f;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease-in-out;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .btn-save {
            background: #28a745;
            color: white;
            padding: 12px 25px;
        }

        .btn-save:hover:not(:disabled) {
            background: #218838;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            padding: 12px 25px;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .filters {
                flex-direction: column;
            }

            .usuarios-table {
                font-size: 12px;
            }

            .usuarios-table th,
            .usuarios-table td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .btn-sm {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div>
                <h1>👥 Gerenciamento de Usuários</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="carregarUsuarios()">🔄 Atualizar</button>
                <button class="btn btn-primary" onclick="abrirModalNovoUsuario()">➕ Novo</button>
            </div>
        </header>

        <!-- Content -->
        <div class="content">
            <!-- Alertas -->
            <div id="alert-container"></div>

            <!-- Filtros -->
            <div class="filters">
                <input type="text" id="filtro-input" placeholder="Filtrar por nome, email ou telefone..." oninput="filtrarUsuarios()">
            </div>

            <!-- Estatísticas -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">👥 Total de Usuários</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">✅ Ativos</div>
                    <div class="stat-value" id="stat-ativos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">💰 Saldo Total</div>
                    <div class="stat-value" id="stat-saldo-total">R$ 0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📊 Saldo Médio</div>
                    <div class="stat-value" id="stat-saldo-medio">R$ 0</div>
                </div>
            </div>

            <!-- Tabela de Usuários -->
            <h2>Detalhes dos Usuários</h2>
            <div id="usuarios-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando usuários...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Novo/Editar Usuário -->
    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-titulo">➕ Novo Usuário</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div id="modal-alert"></div>
            <form id="form-usuario" onsubmit="salvarUsuario(event)">
                <div class="form-group">
                    <label for="usuario-nome">Nome *</label>
                    <input type="text" id="usuario-nome" required placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="usuario-email">Email *</label>
                    <input type="email" id="usuario-email" required placeholder="email@exemplo.com">
                </div>
                <div class="form-group">
                    <label for="usuario-telefone">Telefone</label>
                    <input type="text" id="usuario-telefone" placeholder="(XX) 9XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label for="usuario-senha">Senha *</label>
                    <input type="password" id="usuario-senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="usuario-saldo">Saldo Inicial</label>
                    <input type="number" id="usuario-saldo" step="0.01" min="0" value="0" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="usuario-status">Status</label>
                    <select id="usuario-status">
                        <option value="ativo">✅ Ativo</option>
                        <option value="desativado">❌ Desativado</option>
                        <option value="pendente">⚠️ Pendente</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-save" id="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Editar Senha -->
    <div id="modal-senha" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔐 Editar Senha</h2>
                <button class="modal-close" onclick="fecharModalSenha()">&times;</button>
            </div>
            <div id="modal-senha-alert"></div>
            <form id="form-senha" onsubmit="salvarSenha(event)">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="senha-usuario-info" readonly style="background: #f5f5f5;">
                </div>
                <div class="form-group">
                    <label for="senha-nova">Nova Senha *</label>
                    <input type="password" id="senha-nova" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="senha-confirma">Confirmar Senha *</label>
                    <input type="password" id="senha-confirma" required minlength="6" placeholder="Confirme a senha">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="fecharModalSenha()">Cancelar</button>
                    <button type="submit" class="btn btn-save">Salvar Senha</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyAcVPgUHbL4N9U1-H68klmGKWQF-YGleyc",
            authDomain: "vastbitloud-2872a.firebaseapp.com",
            projectId: "vastbitloud-2872a",
            storageBucket: "vastbitloud-2872a.firebasestorage.app",
            messagingSenderId: "952931184412",
            appId: "1:952931184412:web:ee2a0e38826c30dd0cd4d9",
            measurementId: "G-KWVQ0CFHW2"
        };

        // Initialize Firebase
        console.log("🚀 Inicializando Firebase...");
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log("✅ Firebase inicializado com sucesso");

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        
        let usuariosUnsubscribe = null;
        let usuariosData = [];
        let usuariosDataOriginal = [];
        let usuarioEditandoUID = null;
        let formatador = new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });

        // ============================================
        // CARREGAR USUÁRIOS
        // ============================================

        async function carregarUsuarios() {
            try {
                console.log("📥 Carregando usuários do Firestore...");
                
                if (!db) {
                    console.error("❌ Firestore não inicializado");
                    mostrarAlerta("Firestore não inicializado", "error");
                    return;
                }

                const container = document.getElementById("usuarios-container");
                container.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>⏳ Carregando usuários...</p>
                    </div>
                `;

                if (usuariosUnsubscribe) {
                    usuariosUnsubscribe();
                }

                usuariosUnsubscribe = db.collection("users").onSnapshot(
                    (snapshot) => {
                        console.log("✅ Snapshot recebido:", snapshot.size, "usuários");
                        usuariosData = [];
                        usuariosDataOriginal = [];

                        if (snapshot.empty) {
                            console.log("⚠️ Nenhum usuário encontrado");
                            container.innerHTML = `
                                <div class="empty-state">
                                    <div class="empty-state-icon">👥</div>
                                    <p>Nenhum usuário encontrado</p>
                                    <small>Clique em "➕ Novo" para criar um novo usuário</small>
                                </div>
                            `;
                            atualizarEstatisticas([]);
                            return;
                        }

                        snapshot.forEach((doc) => {
                            try {
                                const usuario = {
                                    uid: doc.id,
                                    ...doc.data()
                                };

                                if (!usuario.uid || !usuario.email) {
                                    console.warn("⚠️ Usuário com dados incompletos");
                                    return;
                                }

                                usuariosData.push(usuario);
                                usuariosDataOriginal.push(usuario);
                            } catch (error) {
                                console.error("❌ Erro ao processar usuário:", error);
                            }
                        });

                        console.log(`✅ Total de usuários: ${usuariosData.length}`);
                        renderizarUsuarios(usuariosData);
                        atualizarEstatisticas(usuariosData);
                    },
                    (error) => {
                        console.error("❌ Erro ao carregar usuários:", error);
                        let msg = "Erro ao carregar usuários";
                        if (error.code === "permission-denied") msg = "Permissão negada ao Firestore";
                        if (error.code === "unavailable") msg = "Firestore indisponível";
                        
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">❌</div>
                                <p>${msg}</p>
                                <small>${error.message}</small>
                            </div>
                        `;
                        mostrarAlerta(msg, "error");
                    }
                );
            } catch (error) {
                console.error("❌ Erro crítico ao carregar usuários:", error);
                mostrarAlerta("Erro crítico: " + error.message, "error");
            }
        }

        // ============================================
        // RENDERIZAR USUÁRIOS
        // ============================================

        function renderizarUsuarios(usuarios) {
            console.log("🎨 Renderizando tabela com", usuarios.length, "usuários");
            const container = document.getElementById("usuarios-container");

            if (!usuarios || usuarios.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>Nenhum usuário encontrado</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table class="usuarios-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>UID</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Status</th>
                            <th>Saldo</th>
                            <th>Senha</th>
                            <th>Data de Criação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            usuarios.forEach((usuario) => {
                try {
                    const nome = usuario.nome || "Sem nome";
                    const email = usuario.email || "Sem email";
                    const telefone = usuario.telefone || "Não informado";
                    const senha = usuario.senha || "N/A";
                    const status = usuario.status || "ativo";
                    const saldo = usuario.saldo || 0;
                    
                    let dataCriacao = "Não informada";
                    if (usuario.createdAt) {
                        try {
                            dataCriacao = new Date(usuario.createdAt.toDate()).toLocaleString("pt-BR");
                        } catch (e) {
                            console.warn("⚠️ Erro ao formatar data");
                        }
                    }

                    const statusBadge = {
                        "ativo": '<span class="status-badge status-ativo">✅ Ativo</span>',
                        "desativado": '<span class="status-badge status-desativado">❌ Desativado</span>',
                        "pendente": '<span class="status-badge status-pendente">⚠️ Pendente</span>'
                    }[status] || '<span class="status-badge status-ativo">✅ Ativo</span>';

                    html += `
                        <tr>
                            <td><strong>${nome}</strong></td>
                            <td>${usuario.uid}</td>
                            <td>${email}</td>
                            <td>${telefone}</td>
                            <td>${statusBadge}</td>
                            <td>${formatador.format(saldo)}</td>
                            <td>
                                <div class="senha-container">
                                    <span class="senha-display masked" id="senha-${usuario.uid}" data-senha="${senha}">••••••••</span>
                                    <button class="btn-toggle-senha" type="button" onclick="toggleSenha('${usuario.uid}')">👁️</button>
                                </div>
                            </td>
                            <td>${dataCriacao}</td>
                            <td>
                                <div class="actions">
                                    <button class="btn-sm btn-password" type="button" onclick="abrirModalEditarSenha('${usuario.uid}', '${nome}')">🔐</button>
                                    <button class="btn-sm btn-edit" type="button" onclick="abrirModalEditarUsuario('${usuario.uid}')">✏️</button>
                                    <button class="btn-sm btn-delete" type="button" onclick="confirmarDelecao('${usuario.uid}', '${nome}')">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    `;
                } catch (error) {
                    console.error("❌ Erro ao renderizar usuário:", error);
                }
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        // ============================================
        // TOGGLE SENHA (MOSTRAR/OCULTAR)
        // ============================================

        function toggleSenha(uid) {
            const senhaElement = document.getElementById(`senha-${uid}`);
            if (!senhaElement) return;

            const senhaReal = senhaElement.getAttribute('data-senha');
            const isMasked = senhaElement.classList.contains('masked');
            const botao = event.target.closest('.btn-toggle-senha');

            if (isMasked) {
                senhaElement.classList.remove('masked');
                senhaElement.textContent = senhaReal;
                if (botao) botao.textContent = '👁️‍🗨️';
                console.log(`🔓 Senha exibida para: ${uid}`);
            } else {
                senhaElement.classList.add('masked');
                senhaElement.textContent = '••••••••';
                if (botao) botao.textContent = '👁️';
                console.log(`🔒 Senha ocultada para: ${uid}`);
            }
        }

        // ============================================
        // ATUALIZAR ESTATÍSTICAS
        // ============================================

        function atualizarEstatisticas(usuarios) {
            try {
                let totalUsuarios = usuarios.length;
                let usuariosAtivos = 0;
                let totalSaldo = 0;

                usuarios.forEach(usuario => {
                    if (usuario.status === "ativo") usuariosAtivos++;
                    totalSaldo += usuario.saldo || 0;
                });

                const mediaSaldo = totalUsuarios > 0 ? totalSaldo / totalUsuarios : 0;

                document.getElementById("stat-total").textContent = totalUsuarios;
                document.getElementById("stat-ativos").textContent = usuariosAtivos;
                document.getElementById("stat-saldo-total").textContent = formatador.format(totalSaldo);
                document.getElementById("stat-saldo-medio").textContent = formatador.format(mediaSaldo);

                console.log("📊 Estatísticas atualizadas");
            } catch (error) {
                console.error("❌ Erro ao atualizar estatísticas:", error);
            }
        }

        // ============================================
        // FILTRAR USUÁRIOS
        // ============================================

        function filtrarUsuarios() {
            const filtro = document.getElementById("filtro-input").value.toLowerCase();
            
            if (!filtro) {
                renderizarUsuarios(usuariosDataOriginal);
                return;
            }

            const usuariosFiltrados = usuariosDataOriginal.filter(usuario => {
                return (usuario.nome && usuario.nome.toLowerCase().includes(filtro)) ||
                       (usuario.email && usuario.email.toLowerCase().includes(filtro)) ||
                       (usuario.telefone && usuario.telefone.toLowerCase().includes(filtro));
            });

            renderizarUsuarios(usuariosFiltrados);
        }

        // ============================================
        // MODAL - NOVO USUÁRIO
        // ============================================

        function abrirModalNovoUsuario() {
            console.log("📝 Abrindo modal para novo usuário");
            usuarioEditandoUID = null;
            document.getElementById("modal-titulo").textContent = "➕ Novo Usuário";
            document.getElementById("form-usuario").reset();
            document.getElementById("usuario-saldo").value = "0";
            document.getElementById("usuario-status").value = "ativo";
            document.getElementById("usuario-senha").required = true;
            document.getElementById("modal-alert").innerHTML = "";
            abrirModal("modal-usuario");
        }

        // ============================================
        // MODAL - EDITAR USUÁRIO
        // ============================================

        async function abrirModalEditarUsuario(uid) {
            try {
                console.log("✏️ Abrindo modal para editar usuário:", uid);
                
                const usuarioSnap = await db.collection("users").doc(uid).get();

                if (!usuarioSnap.exists) {
                    mostrarAlerta("Usuário não encontrado", "error");
                    return;
                }

                const usuario = usuarioSnap.data();
                usuarioEditandoUID = uid;

                document.getElementById("modal-titulo").textContent = "✏️ Editar Usuário";
                document.getElementById("usuario-nome").value = usuario.nome || "";
                document.getElementById("usuario-email").value = usuario.email || "";
                document.getElementById("usuario-telefone").value = usuario.telefone || "";
                document.getElementById("usuario-senha").value = usuario.senha || "";
                document.getElementById("usuario-saldo").value = usuario.saldo || 0;
                document.getElementById("usuario-status").value = usuario.status || "ativo";
                document.getElementById("usuario-senha").required = false;
                document.getElementById("modal-alert").innerHTML = "";

                abrirModal("modal-usuario");
            } catch (error) {
                console.error("❌ Erro ao abrir modal de edição:", error);
                mostrarAlerta("Erro ao carregador usuário: " + error.message, "error");
            }
        }

        // ============================================
        // MODAL - EDITAR SENHA
        // ============================================

        function abrirModalEditarSenha(uid, nome) {
            console.log("🔐 Abrindo modal para editar senha");
            document.getElementById("senha-usuario-info").value = nome;
            document.getElementById("form-senha").dataset.uid = uid;
            document.getElementById("senha-nova").value = "";
            document.getElementById("senha-confirma").value = "";
            document.getElementById("modal-senha-alert").innerHTML = "";
            abrirModal("modal-senha");
        }

        // ============================================
        // SALVAR USUÁRIO
        // ============================================

        async function salvarUsuario(event) {
            event.preventDefault();

            const nome = document.getElementById("usuario-nome").value.trim();
            const email = document.getElementById("usuario-email").value.trim();
            const telefone = document.getElementById("usuario-telefone").value.trim();
            const senha = document.getElementById("usuario-senha").value.trim();
            const saldo = parseFloat(document.getElementById("usuario-saldo").value) || 0;
            const status = document.getElementById("usuario-status").value;

            // Validações
            if (!nome || !email || !telefone || !senha) {
                mostrarAlertaModal("Preencha todos os campos obrigatórios", "error");
                return;
            }

            if (senha.length < 6 && !usuarioEditandoUID) {
                mostrarAlertaModal("A senha deve ter no mínimo 6 caracteres", "error");
                return;
            }

            const btnSalvar = document.getElementById("btn-salvar");
            btnSalvar.disabled = true;

            try {
                if (usuarioEditandoUID) {
                    // Atualizar usuário existente
                    console.log("🔄 Atualizando usuário:", usuarioEditandoUID);

                    const atualizacoes = {
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        saldo: saldo,
                        status: status,
                        updatedAt: new Date()
                    };

                    // Só atualiza senha se foi preenchida
                    if (senha && senha.length >= 6) {
                        atualizacoes.senha = senha;
                        console.log("🔐 Senha será atualizada");
                    }

                    await db.collection("users").doc(usuarioEditandoUID).update(atualizacoes);
                    console.log("✅ Usuário atualizado");
                    mostrarAlertaModal("✅ Usuário atualizado com sucesso", "success");
                } else {
                    // Criar novo usuário
                    console.log("✨ Criando novo usuário");

                    const novoUsuario = {
                        uid: null, // Será preenchido com o doc.id
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        senha: senha,
                        saldo: saldo,
                        status: status,
                        createdAt: new Date(),
                        updatedAt: new Date()
                    };

                    const docRef = await db.collection("users").add(novoUsuario);
                    const uid = docRef.id;

                    // Atualizar o documento com o UID
                    await db.collection("users").doc(uid).update({ uid: uid });

                    console.log("✅ Novo usuário criado:", uid);
                    mostrarAlertaModal("✅ Novo usuário criado com sucesso", "success");
                }

                setTimeout(() => {
                    fecharModal();
                    document.getElementById("btn-salvar").disabled = false;
                }, 500);

            } catch (error) {
                console.error("❌ Erro ao salvar usuário:", error);
                mostrarAlertaModal("❌ Erro: " + error.message, "error");
                btnSalvar.disabled = false;
            }
        }

        // ============================================
        // SALVAR SENHA
        // ============================================

        async function salvarSenha(event) {
            event.preventDefault();

            const novaSenha = document.getElementById("senha-nova").value.trim();
            const confirmaSenha = document.getElementById("senha-confirma").value.trim();
            const formSenha = document.getElementById("form-senha");
            const uid = formSenha.dataset.uid;

            if (!novaSenha || !confirmaSenha) {
                mostrarAlertaModalSenha("Preencha todos os campos", "error");
                return;
            }

            if (novaSenha.length < 6) {
                mostrarAlertaModalSenha("A senha deve ter no mínimo 6 caracteres", "error");
                return;
            }

            if (novaSenha !== confirmaSenha) {
                mostrarAlertaModalSenha("As senhas não conferem", "error");
                return;
            }

            try {
                console.log("🔐 Salvando nova senha...");

                await db.collection("users").doc(uid).update({
                    senha: novaSenha,
                    updatedAt: new Date()
                });

                console.log("✅ Senha atualizada");
                mostrarAlertaModalSenha("✅ Senha atualizada com sucesso", "success");

                setTimeout(() => {
                    fecharModalSenha();
                }, 500);

            } catch (error) {
                console.error("❌ Erro ao atualizar senha:", error);
                mostrarAlertaModalSenha("❌ Erro: " + error.message, "error");
            }
        }

        // ============================================
        // DELETAR USUÁRIO
        // ============================================

        function confirmarDelecao(uid, nome) {
            if (confirm(`⚠️ Tem certeza que deseja deletar ${nome}?\n\nEsta ação não pode ser desfeita!`)) {
                deletarUsuario(uid);
            }
        }

        async function deletarUsuario(uid) {
            try {
                console.log("🗑️ Deletando usuário:", uid);
                
                await db.collection("users").doc(uid).delete();

                console.log("✅ Usuário deletado");
                mostrarAlerta("✅ Usuário deletado com sucesso", "success");
            } catch (error) {
                console.error("❌ Erro ao deletar usuário:", error);
                mostrarAlerta("❌ Erro: " + error.message, "error");
            }
        }

        // ============================================
        // FUNÇÕES DE ALERTA
        // ============================================

        function mostrarAlerta(mensagem, tipo = "info") {
            const container = document.getElementById("alert-container");
            const alertId = "alert-" + Date.now();
            
            const alertHTML = `
                <div id="${alertId}" class="alert ${tipo}">
                    ${mensagem}
                </div>
            `;
            
            container.insertAdjacentHTML("beforeend", alertHTML);
            
            setTimeout(() => {
                const alertEl = document.getElementById(alertId);
                if (alertEl) alertEl.remove();
            }, 5000);
        }

        function mostrarAlertaModal(mensagem, tipo = "info") {
            const container = document.getElementById("modal-alert");
            container.innerHTML = `<div class="alert ${tipo}">${mensagem}</div>`;
        }

        function mostrarAlertaModalSenha(mensagem, tipo = "info") {
            const container = document.getElementById("modal-senha-alert");
            container.innerHTML = `<div class="alert ${tipo}">${mensagem}</div>`;
        }

        // ============================================
        // FUNÇÕES DE MODAL
        // ============================================

        function abrirModal(modalId) {
            document.getElementById(modalId).style.display = "block";
        }

        function fecharModal() {
            document.getElementById("modal-usuario").style.display = "none";
            document.getElementById("form-usuario").reset();
            usuarioEditandoUID = null;
        }

        function fecharModalSenha() {
            document.getElementById("modal-senha").style.display = "none";
            document.getElementById("form-senha").reset();
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            const modalUsuario = document.getElementById("modal-usuario");
            const modalSenha = document.getElementById("modal-senha");
            
            if (event.target == modalUsuario) {
                fecharModal();
            }
            if (event.target == modalSenha) {
                fecharModalSenha();
            }
        }

        // ============================================
        // INICIALIZAR SISTEMA
        // ============================================

        document.addEventListener("DOMContentLoaded", function() {
            console.log("📱 Página carregada - Iniciando carregamento de usuários");
            carregarUsuarios();
        });

        console.log("✅ Sistema carregado com sucesso");
    </script>
</body>
</html>
