
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Usuários</title>

    <!-- Firebase v9 Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        header h1 {
            font-size: 28px;
            font-weight: bold;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn-primary {
            background: #17a2b8;
            color: white;
        }

        .btn-primary:hover {
            background: #138496;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .content {
            padding: 30px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filters input {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .filters input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        h2 {
            margin: 30px 0 20px 0;
            color: #333;
            font-size: 20px;
        }

        .usuarios-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .usuarios-table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .usuarios-table th,
        .usuarios-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .usuarios-table th {
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
        }

        .usuarios-table tbody tr {
            transition: background-color 0.2s;
        }

        .usuarios-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .usuarios-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-ativo {
            background: #d4edda;
            color: #155724;
        }

        .status-desativado {
            background: #f8d7da;
            color: #721c24;
        }

        .status-pendente {
            background: #fff3cd;
            color: #856404;
        }

        .saldo-cell {
            font-weight: bold;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .saldo-positivo {
            color: #1e7e34;
        }

        .saldo-negativo {
            color: #c82333;
        }

        .saldo-neutro {
            color: #333;
        }

        .saldo-atualizado {
            animation: saldoPulse 1s ease;
        }

        @keyframes saldoPulse {
            0% {
                background-color: rgba(102, 126, 234, 0.15);
            }
            50% {
                background-color: rgba(102, 126, 234, 0.5);
            }
            100% {
                background-color: transparent;
            }
        }

        .actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #007bff;
            color: white;
        }

        .btn-edit:hover {
            background: #0056b3;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-password {
            background: #6c3fb5;
            color: white;
        }

        .btn-password:hover {
            background: #5a2f8f;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: slideDown 0.3s ease-in-out;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            justify-content: flex-end;
        }

        .btn-save {
            background: #28a745;
            color: white;
            padding: 12px 25px;
        }

        .btn-save:hover:not(:disabled) {
            background: #218838;
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
            padding: 12px 25px;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .filters {
                flex-direction: column;
            }

            .usuarios-table {
                font-size: 12px;
            }

            .usuarios-table th,
            .usuarios-table td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .btn-sm {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div>
                <h1>👥 Gerenciamento de Usuários</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="carregarUsuarios()">🔄 Atualizar</button>
                <button class="btn btn-primary" onclick="abrirModalNovoUsuario()">➕ Novo</button>
                <button class="btn btn-secondary" onclick="puxarSaldos()">📈 Puxar Saldos</button>
            </div>
        </header>

        <!-- Content -->
        <div class="content">
            <!-- Alertas -->
            <div id="alert-container"></div>

            <!-- Filtros -->
            <div class="filters">
                <input type="text" id="filtro-input" placeholder="Filtrar por nome, email ou telefone..." oninput="filtrarUsuarios()">
            </div>

            <!-- Estatísticas -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">👥 Total de Usuários</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">✅ Ativos</div>
                    <div class="stat-value" id="stat-ativos">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">💰 Saldo Total</div>
                    <div class="stat-value" id="stat-saldo-total">R$ 0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">📊 Saldo Médio</div>
                    <div class="stat-value" id="stat-saldo-medio">R$ 0</div>
                </div>
            </div>

            <!-- Tabela de Usuários -->
            <h2>Detalhes dos Usuários</h2>
            <div id="usuarios-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando usuários...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Novo/Editar Usuário -->
    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-titulo">➕ Novo Usuário</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div id="modal-alert"></div>
            <form id="form-usuario" onsubmit="salvarUsuario(event)">
                <div class="form-group">
                    <label for="usuario-nome">Nome *</label>
                    <input type="text" id="usuario-nome" required placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="usuario-email">Email *</label>
                    <input type="email" id="usuario-email" required placeholder="email@exemplo.com">
                </div>
                <div class="form-group">
                    <label for="usuario-telefone">Telefone</label>
                    <input type="text" id="usuario-telefone" placeholder="(XX) 9XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label for="usuario-senha">Senha *</label>
                    <input type="password" id="usuario-senha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="usuario-saldo">Saldo Inicial</label>
                    <input type="number" id="usuario-saldo" step="0.01" min="0" value="0" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="usuario-status">Status</label>
                    <select id="usuario-status">
                        <option value="ativo">✅ Ativo</option>
                        <option value="desativado">❌ Desativado</option>
                        <option value="pendente">⚠️ Pendente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="usuario-uid">UID (Documento ID)</label>
                    <input type="text" id="usuario-uid" placeholder="Deixe vazio para auto-gerar" readonly>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-save" id="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION & INITIALIZATION
        // ============================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyAcVPgUHbL4N9U1-H68klmGKWQF-YGleyc",
            authDomain: "vastbitloud-2872a.firebaseapp.com",
            projectId: "vastbitloud-2872a",
            storageBucket: "vastbitloud-2872a.firebasestorage.app",
            messagingSenderId: "952931184412",
            appId: "1:952931184412:web:ee2a0e38826c30dd0cd4d9",
            measurementId: "G-KWVQ0CFHW2"
        };

        // Initialize Firebase
        let db = null;
        let auth = null;

        try {
            const app = firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            auth = firebase.auth();
            console.log("✅ Firebase inicializado com sucesso");
        } catch (error) {
            console.error("❌ Erro ao inicializar Firebase:", error);
            alert("Erro ao conectar com o Firebase. Verifique o console.");
        }

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        
        let usuariosUnsubscribe = null;
        let usuariosData = [];
        let usuariosDataOriginal = [];
        let usuarioEditandoUID = null;
        let saldoAlteradoUids = new Set();
        let usuarioLogado = null;
        
        const formatador = new Intl.NumberFormat('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });

        // ============================================
        // VALIDAÇÕES E UTILITÁRIOS
        // ============================================

        function validarEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function validarSenha(senha) {
            return senha && senha.length >= 6;
        }

        function sanitizarEntrada(entrada) {
            if (typeof entrada !== 'string') return entrada;
            return entrada.trim().replace(/[<>\"']/g, '');
        }

        // ============================================
        // AUTENTICAÇÃO
        // ============================================

        async function verificarUsuarioLogado() {
            return new Promise((resolve) => {
                try {
                    if (!auth) {
                        console.error("❌ Auth não inicializado");
                        resolve(false);
                        return;
                    }

                    auth.onAuthStateChanged((user) => {
                        if (user) {
                            usuarioLogado = user;
                            console.log("✅ Usuário logado:", user.email);
                            resolve(true);
                        } else {
                            usuarioLogado = null;
                            console.warn("⚠️ Nenhum usuário logado");
                            resolve(false);
                        }
                    });
                } catch (error) {
                    console.error("❌ Erro ao verificar usuário:", error);
                    resolve(false);
                }
            });
        }

        async function fazerLogin() {
            try {
                const email = prompt("Email para login:");
                if (!email) return;

                const senha = prompt("Senha:");
                if (!senha) return;

                if (!validarEmail(email)) {
                    mostrarAlerta("Email inválido", "error");
                    return;
                }

                console.log("📝 Tentando login...");
                const resultado = await auth.signInWithEmailAndPassword(email, senha);
                usuarioLogado = resultado.user;
                console.log("✅ Login realizado:", email);
                mostrarAlerta("✅ Login realizado com sucesso", "success");
                
                await carregarUsuarios();
            } catch (error) {
                console.error("❌ Erro ao fazer login:", error);
                let mensagem = "Erro ao fazer login";
                if (error.code === "auth/user-not-found") mensagem = "Usuário não encontrado";
                if (error.code === "auth/wrong-password") mensagem = "Senha incorreta";
                if (error.code === "auth/invalid-email") mensagem = "Email inválido";
                
                mostrarAlerta(mensagem, "error");
            }
        }

        async function fazerLogout() {
            try {
                console.log("👋 Fazendo logout...");
                if (usuariosUnsubscribe) {
                    usuariosUnsubscribe();
                    usuariosUnsubscribe = null;
                }
                
                await auth.signOut();
                usuarioLogado = null;
                console.log("✅ Logout realizado");
                mostrarAlerta("✅ Você foi desconectado", "success");
                
                // Limpar interface
                document.getElementById("usuarios-container").innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔒</div>
                        <p>Você foi desconectado</p>
                        <small>Faça login para continuar</small>
                    </div>
                `;
                
                // Não mostrar botões de ações
                document.querySelector(".header-actions").style.display = "none";
            } catch (error) {
                console.error("❌ Erro ao fazer logout:", error);
                mostrarAlerta("Erro ao fazer logout", "error");
            }
        }

        // ============================================
        // PUXAR SALDOS
        // ============================================

        async function puxarSaldos() {
            try {
                if (!usuarioLogado) {
                    mostrarAlerta("❌ Você precisa estar logado", "error");
                    return;
                }

                console.log("📊 Carregando saldos da coleção users...");
                const snapshot = await db.collection("users").get();

                if (snapshot.empty) {
                    console.warn("⚠️ Nenhum usuário encontrado");
                    mostrarAlerta("⚠️ Nenhum usuário encontrado", "info");
                    return;
                }

                const saldos = [];
                let totalSaldo = 0;

                snapshot.forEach(doc => {
                    try {
                        const u = doc.data();
                        const saldo = Number(u.saldo || 0);
                        saldos.push({
                            uid: doc.id,
                            nome: sanitizarEntrada(u.nome || "(sem nome)"),
                            saldo: saldo
                        });
                        totalSaldo += saldo;
                    } catch (error) {
                        console.error("❌ Erro ao processar saldo de usuário:", error);
                    }
                });

                console.log("✅ Saldos obtidos:", saldos);
                console.log("✅ Total saldo:", totalSaldo);
                mostrarAlerta(
                    `📈 Saldos carregados (${saldos.length} usuários, total ${formatador.format(totalSaldo)})`,
                    "success"
                );

            } catch (error) {
                console.error("❌ Erro ao puxar saldos:", error);
                mostrarAlerta("❌ Erro ao puxar saldos: " + error.message, "error");
            }
        }

        // ============================================
        // CARREGAR USUÁRIOS COM TEMPO REAL
        // ============================================

        async function carregarUsuarios() {
            try {
                if (!usuarioLogado) {
                    console.warn("⚠️ Tentativa de carregar usuários sem autenticação");
                    mostrarAlerta("❌ Você precisa fazer login para ver os usuários", "error");
                    document.querySelector(".header-actions").style.display = "none";
                    return;
                }

                console.log("📥 Carregando usuários em tempo real...");
                
                if (!db) {
                    console.error("❌ Firestore não inicializado");
                    mostrarAlerta("Firestore não inicializado", "error");
                    return;
                }

                const container = document.getElementById("usuarios-container");
                container.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>⏳ Carregando usuários...</p>
                    </div>
                `;

                // Limpar listener anterior se existir
                if (usuariosUnsubscribe) {
                    try {
                        usuariosUnsubscribe();
                    } catch (error) {
                        console.warn("⚠️ Erro ao limpar listener anterior:", error);
                    }
                }

                // Configurar listener em tempo real
                usuariosUnsubscribe = db.collection("users").onSnapshot(
                    (snapshot) => {
                        try {
                            console.log("✅ Snapshot recebido:", snapshot.size, "usuários");
                            usuariosData = [];
                            usuariosDataOriginal = [];

                            if (snapshot.empty) {
                                console.log("⚠️ Nenhum usuário encontrado");
                                container.innerHTML = `
                                    <div class="empty-state">
                                        <div class="empty-state-icon">👥</div>
                                        <p>Nenhum usuário encontrado</p>
                                        <small>Clique em "➕ Novo" para criar um novo usuário</small>
                                    </div>
                                `;
                                atualizarEstatisticas([]);
                                return;
                            }

                            // Rastrear mudanças de saldo
                            const antigoUsuariosPorUid = Object.fromEntries(usuariosDataOriginal.map(u => [u.uid, u]));
                            saldoAlteradoUids.clear();

                            snapshot.forEach((doc) => {
                                try {
                                    const usuario = {
                                        uid: doc.id,
                                        ...doc.data()
                                    };

                                    // Validar dados
                                    if (!usuario.uid) {
                                        console.warn("⚠️ Usuário sem UID encontrado, ignorando");
                                        return;
                                    }

                                    // Sanitizar dados
                                    usuario.nome = sanitizarEntrada(usuario.nome || "Sem nome");
                                    usuario.email = sanitizarEntrada(usuario.email || "");
                                    usuario.telefone = sanitizarEntrada(usuario.telefone || "Não informado");
                                    usuario.status = usuario.status || "ativo";
                                    usuario.saldo = Number(usuario.saldo || 0);

                                    // Detectar alteração de saldo
                                    const saldoAntigo = antigoUsuariosPorUid[usuario.uid]?.saldo || 0;
                                    const saldoNovo = usuario.saldo;
                                    if (Number(saldoAntigo) !== Number(saldoNovo)) {
                                        saldoAlteradoUids.add(usuario.uid);
                                    }

                                    usuariosData.push(usuario);
                                    usuariosDataOriginal.push(usuario);
                                } catch (error) {
                                    console.error("❌ Erro ao processar usuário:", error);
                                }
                            });

                            console.log(`✅ Total de usuários: ${usuariosData.length}`);
                            renderizarUsuarios(usuariosData, saldoAlteradoUids);
                            atualizarEstatisticas(usuariosData);
                        } catch (error) {
                            console.error("❌ Erro ao processar snapshot:", error);
                            mostrarAlerta("Erro ao processar dados: " + error.message, "error");
                        }
                    },
                    (error) => {
                        console.error("❌ Erro ao carregar usuários:", error);
                        console.error("🔴 Código do erro:", error.code);
                        console.error("💬 Mensagem completa:", error.message);
                        
                        let mensagem = "Erro ao carregar usuários";
                        let detalhes = error.message;
                        
                        // Tratamento específico por tipo de erro
                        if (error.code === "permission-denied") {
                            mensagem = "Permissão negada ao Firestore";
                            detalhes = "Configure as regras de segurança do Firestore";
                        } else if (error.code === "unavailable") {
                            mensagem = "Firestore indisponível";
                            detalhes = "Verifique sua conexão com a internet";
                        } else if (error.code === "unauthenticated") {
                            mensagem = "Você não está autenticado";
                            detalhes = "Faça login novamente";
                        } else if (error.code === "failed-precondition") {
                            mensagem = "Índice do Firestore não configurado";
                            detalhes = "Clique no link no console para criar o índice automaticamente";
                            console.warn("⚠️ Este erro é normal na primeira query com múltiplos campos");
                            console.warn("⚠️ Veja o link no console para criar o índice");
                        }
                        
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">❌</div>
                                <p>${mensagem}</p>
                                <small>${detalhes}</small>
                            </div>
                        `;
                        mostrarAlerta(mensagem + ": " + detalhes, "error");
                    }
                );

                // Mostrar botões de ações
                document.querySelector(".header-actions").style.display = "flex";

            } catch (error) {
                console.error("❌ Erro crítico ao carregar usuários:", error);
                mostrarAlerta("❌ Erro crítico: " + error.message, "error");
            }
        }

        // ============================================
        // RENDERIZAR USUÁRIOS NA TABELA
        // ============================================

        function renderizarUsuarios(usuarios, saldoAlterado = new Set()) {
            try {
                console.log("🎨 Renderizando tabela com", usuarios.length, "usuários");
                const container = document.getElementById("usuarios-container");

                if (!usuarios || usuarios.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <p>Nenhum usuário encontrado</p>
                        </div>
                    `;
                    return;
                }

                let html = `
                    <table class="usuarios-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>UID</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>Status</th>
                                <th>Saldo</th>
                                <th>Data de Criação</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                usuarios.forEach((usuario) => {
                    try {
                        const nome = usuario.nome || "Sem nome";
                        const email = usuario.email || "Sem email";
                        const telefone = usuario.telefone || "Não informado";
                        const status = usuario.status || "ativo";
                        const saldo = usuario.saldo || 0;
                        
                        let dataCriacao = "Não informada";
                        if (usuario.createdAt) {
                            try {
                                dataCriacao = new Date(usuario.createdAt.toDate()).toLocaleString("pt-BR");
                            } catch (e) {
                                console.warn("⚠️ Erro ao formatar data:", e);
                            }
                        }

                        const statusBadge = {
                            "ativo": '<span class="status-badge status-ativo">✅ Ativo</span>',
                            "desativado": '<span class="status-badge status-desativado">❌ Desativado</span>',
                            "pendente": '<span class="status-badge status-pendente">⚠️ Pendente</span>'
                        }[status] || '<span class="status-badge status-ativo">✅ Ativo</span>';

                        const saldoClass = saldo > 0 ? 'saldo-positivo' : saldo < 0 ? 'saldo-negativo' : 'saldo-neutro';
                        const atualizadoClass = saldoAlterado.has(usuario.uid) ? ' saldo-atualizado' : '';

                        html += `
                            <tr data-uid="${usuario.uid}">
                                <td><strong>${sanitizarEntrada(nome)}</strong></td>
                                <td><code>${usuario.uid}</code></td>
                                <td>${sanitizarEntrada(email)}</td>
                                <td>${sanitizarEntrada(telefone)}</td>
                                <td>${statusBadge}</td>
                                <td class="saldo-cell ${saldoClass}${atualizadoClass}">${formatador.format(saldo)}</td>
                                <td>${dataCriacao}</td>
                                <td>
                                    <div class="actions">
                                        <button class="btn-sm btn-password" type="button" onclick="abrirModalEditarSenha('${usuario.uid}', '${sanitizarEntrada(nome)}')">🔐</button>
                                        <button class="btn-sm btn-edit" type="button" onclick="abrirModalEditarUsuario('${usuario.uid}')">✏️</button>
                                        <button class="btn-sm btn-delete" type="button" onclick="confirmarDelecao('${usuario.uid}', '${sanitizarEntrada(nome)}')">🗑️</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    } catch (error) {
                        console.error("❌ Erro ao renderizar usuário:", error);
                    }
                });

                html += `
                        </tbody>
                    </table>
                `;

                container.innerHTML = html;
            } catch (error) {
                console.error("❌ Erro ao renderizar usuários:", error);
                mostrarAlerta("Erro ao renderizar usuários: " + error.message, "error");
            }
        }

        // ============================================
        // ATUALIZAR ESTATÍSTICAS
        // ============================================

        function atualizarEstatisticas(usuarios) {
            try {
                let totalUsuarios = 0;
                let usuariosAtivos = 0;
                let totalSaldo = 0;

                if (Array.isArray(usuarios)) {
                    totalUsuarios = usuarios.length;
                    usuarios.forEach(usuario => {
                        if (usuario.status === "ativo") usuariosAtivos++;
                        totalSaldo += Number(usuario.saldo) || 0;
                    });
                }

                const mediaSaldo = totalUsuarios > 0 ? totalSaldo / totalUsuarios : 0;

                document.getElementById("stat-total").textContent = totalUsuarios;
                document.getElementById("stat-ativos").textContent = usuariosAtivos;
                document.getElementById("stat-saldo-total").textContent = formatador.format(totalSaldo);
                document.getElementById("stat-saldo-medio").textContent = formatador.format(mediaSaldo);

                console.log("📊 Estatísticas atualizadas:", {
                    total: totalUsuarios,
                    ativos: usuariosAtivos,
                    totalSaldo: totalSaldo,
                    mediaSaldo: mediaSaldo
                });
            } catch (error) {
                console.error("❌ Erro ao atualizar estatísticas:", error);
            }
        }

        // ============================================
        // FILTRAR USUÁRIOS
        // ============================================

        function filtrarUsuarios() {
            try {
                const filtro = document.getElementById("filtro-input").value.toLowerCase();
                
                if (!filtro) {
                    renderizarUsuarios(usuariosDataOriginal);
                    return;
                }

                const usuariosFiltrados = usuariosDataOriginal.filter(usuario => {
                    return (usuario.nome && usuario.nome.toLowerCase().includes(filtro)) ||
                           (usuario.email && usuario.email.toLowerCase().includes(filtro)) ||
                           (usuario.telefone && usuario.telefone.toLowerCase().includes(filtro)) ||
                           (usuario.uid && usuario.uid.toLowerCase().includes(filtro));
                });

                console.log(`🔍 ${usuariosFiltrados.length} usuários encontrados com filtro: "${filtro}"`);
                renderizarUsuarios(usuariosFiltrados);
            } catch (error) {
                console.error("❌ Erro ao filtrar usuários:", error);
            }
        }

        // ============================================
        // SALVAR USUÁRIO
        // ============================================

        async function salvarUsuario(event) {
            event.preventDefault();

            if (!usuarioLogado) {
                mostrarAlerta("❌ Você precisa estar logado", "error");
                return;
            }

            try {
                const nome = sanitizarEntrada(document.getElementById("usuario-nome").value);
                const email = sanitizarEntrada(document.getElementById("usuario-email").value);
                const telefone = sanitizarEntrada(document.getElementById("usuario-telefone").value);
                const senha = document.getElementById("usuario-senha").value.trim();
                const saldo = parseFloat(document.getElementById("usuario-saldo").value) || 0;
                const status = document.getElementById("usuario-status").value;
                const novoUID = sanitizarEntrada(document.getElementById("usuario-uid").value);

                // Validações
                if (!nome || nome.length < 3) {
                    mostrarAlertaModal("Nome deve ter no mínimo 3 caracteres", "error");
                    return;
                }

                if (!email || !validarEmail(email)) {
                    mostrarAlertaModal("Email inválido", "error");
                    return;
                }

                if (usuarioEditandoUID) {
                    // Editando - senha é opcional
                    if (senha && !validarSenha(senha)) {
                        mostrarAlertaModal("Senha deve ter no mínimo 6 caracteres", "error");
                        return;
                    }
                } else {
                    // Criando - senha é obrigatória
                    if (!senha || !validarSenha(senha)) {
                        mostrarAlertaModal("Senha deve ter no mínimo 6 caracteres", "error");
                        return;
                    }
                }

                if (isNaN(saldo) || saldo < 0) {
                    mostrarAlertaModal("Saldo deve ser um número não negativo", "error");
                    return;
                }

                if (!["ativo", "desativado", "pendente"].includes(status)) {
                    mostrarAlertaModal("Status inválido", "error");
                    return;
                }

                const btnSalvar = document.getElementById("btn-salvar");
                btnSalvar.disabled = true;

                if (usuarioEditandoUID) {
                    // EDITAR USUÁRIO
                    console.log("🔄 Atualizando usuário:", usuarioEditandoUID);

                    const atualizacoes = {
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        saldo: saldo,
                        status: status,
                        updatedAt: new Date()
                    };

                    // Só atualiza senha se foi preenchida
                    if (senha) {
                        atualizacoes.senha = senha;
                        console.log("🔐 Senha será atualizada");
                    }

                    // Se UID mudou
                    if (novoUID && novoUID !== usuarioEditandoUID) {
                        console.log("🔄 Migrando UID de", usuarioEditandoUID, "para", novoUID);

                        // Verificar se novo UID já existe
                        const novoDocSnap = await db.collection("users").doc(novoUID).get();
                        if (novoDocSnap.exists) {
                            mostrarAlertaModal("UID já existe, escolha outro", "error");
                            btnSalvar.disabled = false;
                            return;
                        }

                        // Criar novo documento
                        const novoUsuario = {
                            uid: novoUID,
                            nome: nome,
                            email: email,
                            telefone: telefone,
                            senha: senha || document.getElementById("usuario-senha").value,
                            saldo: saldo,
                            status: status,
                            createdAt: new Date(),
                            updatedAt: new Date()
                        };

                        await db.collection("users").doc(novoUID).set(novoUsuario);
                        console.log("✅ Novo documento criado:", novoUID);

                        // Deletar documento antigo
                        await db.collection("users").doc(usuarioEditandoUID).delete();
                        console.log("🗑️ Documento antigo deletado:", usuarioEditandoUID);

                        mostrarAlertaModal("✅ UID alterado e usuário atualizado", "success");
                    } else {
                        // UID não mudou
                        await db.collection("users").doc(usuarioEditandoUID).update(atualizacoes);
                        console.log("✅ Usuário atualizado");
                        mostrarAlertaModal("✅ Usuário atualizado com sucesso", "success");
                    }
                } else {
                    // CRIAR NOVO USUÁRIO
                    console.log("✨ Criando novo usuário");

                    const novoUsuario = {
                        uid: novoUID || null,
                        nome: nome,
                        email: email,
                        telefone: telefone,
                        senha: senha,
                        saldo: saldo,
                        status: status,
                        createdAt: new Date(),
                        updatedAt: new Date()
                    };

                    let docRef;
                    if (novoUID) {
                        // Verificar se UID já existe
                        const existeSnap = await db.collection("users").doc(novoUID).get();
                        if (existeSnap.exists) {
                            mostrarAlertaModal("UID já existe", "error");
                            btnSalvar.disabled = false;
                            return;
                        }

                        novoUsuario.uid = novoUID;
                        await db.collection("users").doc(novoUID).set(novoUsuario);
                        docRef = { id: novoUID };
                        console.log("✅ Usuário criado com UID específico:", novoUID);
                    } else {
                        // Auto-gerar UID
                        docRef = await db.collection("users").add(novoUsuario);
                        await db.collection("users").doc(docRef.id).update({ uid: docRef.id });
                        console.log("✅ Usuário criado com UID auto-gerado:", docRef.id);
                    }

                    mostrarAlertaModal("✅ Novo usuário criado com sucesso", "success");
                }

                setTimeout(() => {
                    fecharModal();
                    btnSalvar.disabled = false;
                }, 500);

            } catch (error) {
                console.error("❌ Erro ao salvar usuário:", error);
                mostrarAlertaModal("❌ Erro: " + error.message, "error");
                document.getElementById("btn-salvar").disabled = false;
            }
        }

        // ============================================
        // SALVAR NOVA SENHA
        // ============================================

        async function salvarSenha(event) {
            event.preventDefault();

            if (!usuarioLogado) {
                mostrarAlerta("❌ Você precisa estar logado", "error");
                return;
            }

            try {
                const novaSenha = document.getElementById("senha-nova").value.trim();
                const confirmaSenha = document.getElementById("senha-confirma").value.trim();
                const formSenha = document.getElementById("form-senha");
                const uid = formSenha.dataset.uid;

                if (!uid) {
                    console.error("❌ UID não encontrado");
                    mostrarAlertaModalSenha("Erro: UID não identificado", "error");
                    return;
                }

                if (!novaSenha || !confirmaSenha) {
                    mostrarAlertaModalSenha("Preencha todos os campos", "error");
                    return;
                }

                if (!validarSenha(novaSenha)) {
                    mostrarAlertaModalSenha("Senha deve ter no mínimo 6 caracteres", "error");
                    return;
                }

                if (novaSenha !== confirmaSenha) {
                    mostrarAlertaModalSenha("As senhas não conferem", "error");
                    return;
                }

                console.log("🔐 Atualizando senha para UID:", uid);

                await db.collection("users").doc(uid).update({
                    senha: novaSenha,
                    updatedAt: new Date()
                });

                console.log("✅ Senha atualizada com sucesso");
                mostrarAlertaModalSenha("✅ Senha atualizada com sucesso", "success");

                setTimeout(() => {
                    fecharModalSenha();
                }, 500);

            } catch (error) {
                console.error("❌ Erro ao atualizar senha:", error);
                mostrarAlertaModalSenha("❌ Erro: " + error.message, "error");
            }
        }

        // ============================================
        // FUNÇÕES DE ALERTA
        // ============================================

        function mostrarAlerta(mensagem, tipo = "info") {
            const container = document.getElementById("alert-container");
            if (!container) {
                console.error("❌ Container de alertas não encontrado");
                return;
            }

            const alertId = "alert-" + Date.now();
            
            const alertHTML = `
                <div id="${alertId}" class="alert alert-${tipo}">
                    ${mensagem}
                </div>
            `;
            
            container.insertAdjacentHTML("beforeend", alertHTML);
            
            setTimeout(() => {
                try {
                    const alertEl = document.getElementById(alertId);
                    if (alertEl) alertEl.remove();
                } catch (e) {
                    console.warn("⚠️ Erro ao remover alerta:", e);
                }
            }, 5000);
        }

        function mostrarAlertaModal(mensagem, tipo = "info") {
            const container = document.getElementById("modal-alert");
            if (container) {
                container.innerHTML = `<div class="alert alert-${tipo}">${mensagem}</div>`;
            }
        }

        function mostrarAlertaModalSenha(mensagem, tipo = "info") {
            const container = document.getElementById("modal-senha-alert");
            if (container) {
                container.innerHTML = `<div class="alert alert-${tipo}">${mensagem}</div>`;
            }
        }

        // ============================================
        // TESTES AUTOMATIZADOS
        // ============================================

        async function testarConexaoFirebase() {
            console.log("🧪 Iniciando testes de conexão com Firebase...");
            
            let sucessos = 0;
            let falhas = 0;

            try {
                // Teste 1: Verificar inicialização
                if (firebase && db && auth) {
                    console.log("✅ Teste 1: Firebase inicializado");
                    sucessos++;
                } else {
                    console.error("❌ Teste 1: Firebase não inicializado corretamente");
                    falhas++;
                }

                // Teste 2: Verificar conexão com Firestore
                try {
                    const snapshot = await db.collection("users").limit(1).get();
                    console.log("✅ Teste 2: Conexão com Firestore OK");
                    sucessos++;
                } catch (error) {
                    console.error("❌ Teste 2: Erro ao conectar Firestore:", error.message);
                    if (error.code === "failed-precondition") {
                        console.warn("⚠️ Erro de índice detectado - isto é normal");
                    }
                    falhas++;
                }

                // Teste 3: Validar funções críticas
                const funcoesCriticas = [
                    'carregarUsuarios',
                    'renderizarUsuarios',
                    'salvarUsuario',
                    'deletarUsuario',
                    'atualizarEstatisticas',
                    'filtrarUsuarios',
                    'verificarUsuarioLogado'
                ];

                funcoesCriticas.forEach(funcao => {
                    if (typeof window[funcao] === 'function') {
                        console.log(`✅ Teste 3.${funcoesCriticas.indexOf(funcao) + 1}: Função '${funcao}' existe`);
                        sucessos++;
                    } else {
                        console.error(`❌ Teste 3.${funcoesCriticas.indexOf(funcao) + 1}: Função '${funcao}' não encontrada`);
                        falhas++;
                    }
                });

                console.log(`\n🧪 RESULTADO DOS TESTES:\n✅ Sucessos: ${sucessos}\n❌ Falhas: ${falhas}`);
                
                if (falhas === 0) {
                    console.log("🎉 TODOS OS TESTES PASSARAM COM SUCESSO!");
                } else {
                    console.warn(`⚠️ ${falhas} teste(s) falharam. Verifique os erros acima.`);
                }

            } catch (error) {
                console.error("❌ Erro ao executar testes:", error);
            }
        }
