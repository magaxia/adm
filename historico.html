<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico Financeiro</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .filtros {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filtro-tipo {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filtro-tipo label {
      font-weight: bold;
      color: #333;
    }

    .filtro-tipo select,
    .filtro-btn {
      padding: 10px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filtro-tipo select:focus,
    .filtro-btn:hover {
      border-color: #667eea;
      outline: none;
    }

    .filtro-btn {
      background: #667eea;
      color: white;
      border: none;
      font-weight: bold;
    }

    .filtro-btn:hover {
      background: #764ba2;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    thead {
      background: #f5f5f5;
      border-bottom: 2px solid #667eea;
    }

    th {
      padding: 15px;
      text-align: left;
      font-weight: bold;
      color: #333;
      font-size: 14px;
      text-transform: uppercase;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #e0e0e0;
      color: #666;
      font-size: 14px;
    }

    tbody tr:hover {
      background: #f9f9f9;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: capitalize;
    }

    .tipo-deposito {
      background: #d4edda;
      color: #155724;
    }

    .tipo-saque {
      background: #fff3cd;
      color: #856404;
    }

    .tipo-compra {
      background: #d6d8db;
      color: #383d41;
    }

    .tipo-rendimento {
      background: #cfe2ff;
      color: #084298;
    }

    .value-positivo {
      color: #28a745;
      font-weight: bold;
    }

    .value-negativo {
      color: #dc3545;
      font-weight: bold;
    }

    .value-neutro {
      color: #007bff;
      font-weight: bold;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state p {
      font-size: 18px;
    }

    .error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .botoes-acao {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d0d0d0;
    }

    .info-usuario {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #666;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .container {
        border-radius: 0;
      }

      header {
        padding: 20px;
      }

      header h1 {
        font-size: 24px;
      }

      .content {
        padding: 20px;
      }

      .filtros {
        flex-direction: column;
        gap: 10px;
      }

      .filtro-tipo {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      th, td {
        padding: 10px;
        font-size: 12px;
      }

      .badge {
        padding: 4px 8px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <header>
    <h1>📊 Histórico Financeiro</h1>
    <p>Acompanhe todas as suas movimentações financeiras em tempo real</p>
  </header>

  <div class="content">

    <!-- Informações do usuário -->
    <div id="info-usuario" class="info-usuario">
      Status: Carregando...
    </div>

    <div class="header-actions" style="margin: 15px 0; display: flex; gap: 10px; flex-wrap: wrap;">
      <button id="btn-show-login" class="btn btn-primary" onclick="mostrarLogin()">🔐 Login</button>
      <button id="btn-logout" class="btn btn-secondary" onclick="fazerLogout()" style="display: none;">🚪 Logout</button>
      <input id="filter-uid" type="text" placeholder="UID do usuário (sem login)" style="flex: 1; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 8px;" />
      <button id="btn-uid-run" class="btn btn-primary" onclick="carregarHistoricoPorUID()">🔎 Carregar por UID</button>
    </div>

    <!-- Formulário de Login -->
    <div id="login-form" class="login-form" style="display: none;">
      <div class="login-container">
        <h3>🔐 Fazer Login</h3>
        <div class="form-group">
          <label for="login-email">Email:</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-senha">Senha:</label>
          <input type="password" id="login-senha" placeholder="Digite sua senha" required>
        </div>
        <button class="btn-login" onclick="fazerLogin()">Entrar</button>
        <button class="btn-cancel" onclick="fecharLogin()">Cancelar</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <div class="filtro-tipo">
        <label for="selectTipo">🔍 Filtrar por tipo:</label>
        <select id="selectTipo">
          <option value="">Todos</option>
          <option value="deposito">💰 Depósito</option>
          <option value="saque">💸 Saque</option>
          <option value="compra">🛒 Compra</option>
          <option value="rendimento">📈 Rendimento</option>
        </select>
      </div>
      <button class="filtro-btn" onclick="aplicarFiltros()">Aplicar Filtro</button>
      <button class="filtro-btn" style="background: #6c757d;" onclick="limparFiltros()">Limpar</button>
      <button class="filtro-btn" style="background: #28a745; margin-left: auto;" onclick="exportarCSV()">📥 Exportar CSV</button>
    </div>

    <!-- Estatísticas -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">💰 Total em Depósitos</div>
        <div class="stat-value" id="stat-depositos">R$ 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">💸 Total em Saques</div>
        <div class="stat-value" id="stat-saques">R$ 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🛒 Total em Compras</div>
        <div class="stat-value" id="stat-compras">R$ 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📈 Total em Rendimentos</div>
        <div class="stat-value" id="stat-rendimentos">R$ 0</div>
      </div>
    </div>

    <!-- Tabela de Histórico -->
    <div class="table-wrapper">
      <table id="tabelaHistorico">
        <thead>
          <tr>
            <th>Tipo</th>
            <th>Descrição</th>
            <th>Valor</th>
            <th>Data</th>
            <th>Hora</th>
          </tr>
        </thead>
        <tbody id="tbody-historico">
          <tr>
            <td colspan="5" style="text-align: center; padding: 40px;">
              <div class="spinner"></div>
              <p>Carregando histórico...</p>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Botões de ação -->
    <div class="botoes-acao">
      <button class="btn btn-primary" onclick="document.location.href='index.html'">
        ⬅️ Voltar ao Painel
      </button>
      <button class="btn btn-secondary" onclick="atualizarHistorico()">
        🔄 Atualizar Agora
      </button>
    </div>

  </div>

</div>

<script>

// =============================
// CONFIGURAÇÃO FIREBASE
// =============================

const firebaseConfig = {
  apiKey: "AIzaSyAcVPgUHbL4N9U1-H68klmGKWQF-YGleyc",
  authDomain: "vastbitloud-2872a.firebaseapp.com",
  projectId: "vastbitloud-2872a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let unsubscribe = null;
let historicoCompleto = [];
let usuarioAtual = null;

console.log("Firebase inicializado, projeto:", firebaseConfig.projectId);
console.log("Firestore conectado:", db);

// =============================
// VERIFICAR AUTENTICAÇÃO (OPCIONAL)
// =============================

console.log("Verificando estado de autenticação...");
firebase.auth().onAuthStateChanged(user => {
  console.log("Estado de autenticação mudou:", user ? "Logado" : "Não logado", user ? "UID: " + user.uid : "");
  if (user) {
    usuarioAtual = user;
    document.getElementById("info-usuario").innerHTML = `
      ✅ Autenticado como: <strong>${user.email}</strong> (UID: ${user.uid})
    `;
    document.getElementById("btn-show-login").style.display = "none";
    document.getElementById("btn-logout").style.display = "inline-block";
    document.getElementById("filter-uid").value = user.uid;
    console.log("Chamando carregarHistorico com UID:", user.uid);
    carregarHistorico(user.uid);
  } else {
    // Redirecionar para login se não autenticado
    console.log("Usuário não autenticado, redirecionando para login.html");
    window.location.href = 'login.html';
  }
});

// =============================
// CARREGAR HISTÓRICO EM TEMPO REAL
// =============================

function carregarHistorico(uid = null) {
  const filterUid = uid || document.getElementById("filter-uid").value.trim() || (usuarioAtual ? usuarioAtual.uid : null);

  if (!filterUid) {
    document.getElementById("info-usuario").innerHTML = `
      ℹ️ Nenhum UID disponível. Faça login ou informe um UID no campo acima.`;
    document.getElementById("tbody-historico").innerHTML = `
      <tr>
        <td colspan="5" style="text-align: center; padding: 40px;">
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <p>Nenhum histórico encontrado</p>
          </div>
        </td>
      </tr>
    `;
    atualizarEstatisticas([]);
    return;
  }

  document.getElementById("info-usuario").innerHTML = `
    🔎 Histórico do UID: <strong>${filterUid}</strong>
  `;

  // Verificar se a coleção existe e testar conexão
  console.log("Testando conexão com Firestore e coleção 'historico'...");
  db.collection("historico").limit(1).get()
    .then(testSnapshot => {
      console.log("Teste de conexão Firestore OK, coleção 'historico' acessível. Registros de teste:", testSnapshot.size);
    })
    .catch(error => {
      console.error("Erro na conexão Firestore:", error.code, error.message);
      document.getElementById("tbody-historico").innerHTML = `
        <tr>
          <td colspan="5" style="text-align: center; padding: 40px;">
            <div class="error">
              ❌ Erro de conexão com Firestore: ${error.message}<br>
              Verifique as regras de segurança.
            </div>
          </td>
        </tr>
      `;
    });

  if (unsubscribe) {
    unsubscribe();
  }

  // Buscar dados filtrando pelo UID no servidor (sem orderBy para evitar índice composto)
  console.log("Iniciando consulta Firestore para UID:", filterUid);
  unsubscribe = db.collection("historico")
    .where("uid", "==", filterUid)
    .onSnapshot(
      snapshot => {
        console.log("Consulta executada com sucesso. Dados recebidos do Firestore:", snapshot.size, "registros para UID:", filterUid);

        if (snapshot.empty) {
          console.log("Nenhum registro encontrado para UID:", filterUid, "- Snapshot vazio");
          document.getElementById("tbody-historico").innerHTML = `
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">
                <div class="empty-state">
                  <div class="empty-state-icon">📭</div>
                  <p>Nenhum histórico encontrado</p>
                </div>
              </td>
            </tr>
          `;
          historicoCompleto = [];
          atualizarEstatisticas([]);
          return;
        }

        historicoCompleto = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          let registroData = data.data;
          if (registroData && typeof registroData.toDate === 'function') {
            registroData = registroData.toDate();
          } else if (!registroData) {
            registroData = new Date();
          }
          historicoCompleto.push({ id: doc.id, ...data, data: registroData });
        });

        // Ordena localmente por data desc para não depender de índice composto
        historicoCompleto.sort((a, b) => {
          const ta = a.data instanceof Date ? a.data : new Date(a.data);
          const tb = b.data instanceof Date ? b.data : new Date(b.data);
          return tb - ta;
        });

        console.log("Registros processados:", historicoCompleto.length, "para UID:", filterUid);
        renderizarTabela(historicoCompleto);
        atualizarEstatisticas(historicoCompleto);
      },
      error => {
        console.error("Erro no Firestore durante consulta de histórico:", error.code, error.message, "UID:", filterUid);
        if (error.code === 'FAILED_PRECONDITION') {
          document.getElementById("tbody-historico").innerHTML = `
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">
                <div class="error">
                  ❌ Índice necessário não encontrado.<br>
                  <a href="https://console.firebase.google.com/project/vastbitloud-2872a/firestore/indexes" target="_blank">
                    Criar índice no Firestore
                  </a>
                </div>
              </td>
            </tr>
          `;
        } else if (error.code === 'permission-denied') {
          document.getElementById("tbody-historico").innerHTML = `
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">
                <div class="error">
                  ❌ Permissão negada. Verifique as regras de segurança do Firestore.
                </div>
              </td>
            </tr>
          `;
        } else {
          document.getElementById("tbody-historico").innerHTML = `
            <tr>
              <td colspan="5" style="text-align: center; padding: 40px;">
                <div class="error">
                  ❌ Erro ao carregar histórico: ${error.message}
                </div>
              </td>
            </tr>
          `;
        }
      }
    );
}

function carregarHistoricoPorUID() {
  const uid = document.getElementById("filter-uid").value.trim();
  carregarHistorico(uid);
}

function mostrarErroNaTela(mensagem) {
  document.getElementById("tbody-historico").innerHTML = `
    <tr>
      <td colspan="5" style="text-align: center; padding: 40px;">
        <div class="error">
          ❌ ${mensagem}
        </div>
      </td>
    </tr>
  `;
}

// =============================
// RENDERIZAR TABELA
// =============================

function renderizarTabela(dados) {
  const tbody = document.getElementById("tbody-historico");

  if (dados.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align: center; padding: 40px;">
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>Nenhuma movimentação registrada</p>
          </div>
        </td>
      </tr>
    `;
    return;
  }

  let html = "";
  const formatador = new Intl.NumberFormat("pt-BR", {
    style: "currency",
    currency: "BRL"
  });

  dados.forEach(item => {
    let data = null;
    let dataFormatada = "Data indisponível";
    let hora = "";

    if (item.data) {
      if (typeof item.data.toDate === 'function') {
        data = new Date(item.data.toDate());
      } else if (item.data instanceof Date) {
        data = item.data;
      } else if (typeof item.data === 'string') {
        data = new Date(item.data);
      } else if (typeof item.data === 'number') {
        data = new Date(item.data);
      }

      if (data && !isNaN(data.getTime())) {
        dataFormatada = data.toLocaleDateString("pt-BR");
        hora = data.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
      }
    }

    // Determinar classe do tipo
    let classTipo = "badge tipo-" + item.tipo;
    let textoTipo = item.tipo.charAt(0).toUpperCase() + item.tipo.slice(1);

    // Determinar classe do valor
    let classValor = "value-neutro";
    if (item.tipo === "deposito" || item.tipo === "rendimento") {
      classValor = "value-positivo";
    } else if (item.tipo === "saque" || item.tipo === "compra") {
      classValor = "value-negativo";
    }

    const valorFormatado = formatador.format(item.valor || 0);

    html += `
      <tr>
        <td>
          <span class="${classTipo}">${textoTipo}</span>
        </td>
        <td>
          ${item.descricao || "Sem descrição"}
        </td>
        <td>
          <span class="${classValor}">${valorFormatado}</span>
        </td>
        <td>${dataFormatada}</td>
        <td>${hora}</td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}

// =============================
// ATUALIZAR ESTATÍSTICAS
// =============================

function atualizarEstatisticas(dados) {
  const formatador = new Intl.NumberFormat("pt-BR", {
    style: "currency",
    currency: "BRL"
  });

  let totalDepositos = 0;
  let totalSaques = 0;
  let totalCompras = 0;
  let totalRendimentos = 0;

  dados.forEach(item => {
    const valor = parseFloat(item.valor) || 0;
    
    switch(item.tipo) {
      case "deposito":
        totalDepositos += valor;
        break;
      case "saque":
        totalSaques += valor;
        break;
      case "compra":
        totalCompras += valor;
        break;
      case "rendimento":
        totalRendimentos += valor;
        break;
    }
  });

  document.getElementById("stat-depositos").innerText = formatador.format(totalDepositos);
  document.getElementById("stat-saques").innerText = formatador.format(totalSaques);
  document.getElementById("stat-compras").innerText = formatador.format(totalCompras);
  document.getElementById("stat-rendimentos").innerText = formatador.format(totalRendimentos);
}

// =============================
// APLICAR FILTROS
// =============================

function aplicarFiltros() {
  const tipoSelecionado = document.getElementById("selectTipo").value;

  if (tipoSelecionado === "") {
    renderizarTabela(historicoCompleto);
    return;
  }

  const dadosFiltrados = historicoCompleto.filter(item => item.tipo === tipoSelecionado);
  renderizarTabela(dadosFiltrados);
}

// =============================
// LIMPAR FILTROS
// =============================

function limparFiltros() {
  document.getElementById("selectTipo").value = "";
  renderizarTabela(historicoCompleto);
}

// =============================
// ATUALIZAR HISTÓRICO
// =============================

function atualizarHistorico() {
  carregarHistorico();
  alert("✅ Histórico atualizado!");
}

// =============================
// EXPORTAR PARA CSV
// =============================

function exportarCSV() {
  if (historicoCompleto.length === 0) {
    alert("❌ Nenhum dado para exportar!");
    return;
  }

  let csv = "Tipo,Descrição,Valor,Data,Hora\n";

  historicoCompleto.forEach(item => {
    let data = null;
    let dataFormatada = "";
    let hora = "";

    if (item.data) {
      if (typeof item.data.toDate === 'function') {
        data = new Date(item.data.toDate());
      } else if (item.data instanceof Date) {
        data = item.data;
      } else if (typeof item.data === 'string') {
        data = new Date(item.data);
      } else if (typeof item.data === 'number') {
        data = new Date(item.data);
      }

      if (data && !isNaN(data.getTime())) {
        dataFormatada = data.toLocaleDateString("pt-BR");
        hora = data.toLocaleTimeString("pt-BR", { hour: '2-digit', minute: '2-digit' });
      }
    }

    const tipo = item.tipo || "";
    const descricao = (item.descricao || "").replace(/"/g, '""');
    const valor = (item.valor || 0).toFixed(2);

    csv += `"${tipo}","${descricao}","${valor}","${dataFormatada}","${hora}"\n`;
  });

  // Criar blob e download
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);

  link.setAttribute("href", url);
  link.setAttribute("download", `historico_${new Date().getTime()}.csv`);
  link.style.visibility = "hidden";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  alert("✅ Histórico exportado com sucesso!");
}

// =============================
// ADICIONAR REGISTRO DE HISTÓRICO
// =============================

async function adicionarRegistroHistorico(tipo, valor, descricao, uidUsuario) {
  try {
    // Se não houver UID especificado, usar do usuário autenticado
    let uid = uidUsuario;
    if (!uid && auth.currentUser) {
      uid = auth.currentUser.uid;
    }

    if (!uid) {
      console.warn("Não foi possível obter UID do usuário para registrar no histórico");
      return false;
    }

    await db.collection("historico").add({
      uid: uid,
      tipo: tipo,
      valor: parseFloat(valor) || 0,
      descricao: descricao || "",
      data: firebase.firestore.FieldValue.serverTimestamp()
    });

    console.log(`✅ Registro de ${tipo} adicionado ao histórico`);
    return true;

  } catch (error) {
    console.error("Erro ao adicionar registro de histórico:", error);
    return false;
  }
}

// =============================
// MOSTRAR FORMULÁRIO DE LOGIN
// =============================

function mostrarLogin() {
  document.getElementById("login-form").style.display = "flex";
  document.getElementById("login-email").focus();
}

// =============================
// FECHAR FORMULÁRIO DE LOGIN
// =============================

function fecharLogin() {
  document.getElementById("login-form").style.display = "none";
  document.getElementById("login-email").value = "";
  document.getElementById("login-senha").value = "";
}

// =============================
// FAZER LOGIN
// =============================

async function fazerLogin() {
  const email = document.getElementById("login-email").value.trim();
  const senha = document.getElementById("login-senha").value;

  if (!email || !senha) {
    alert("❌ Por favor, preencha email e senha!");
    return;
  }

  try {
    const userCredential = await firebase.auth().signInWithEmailAndPassword(email, senha);
    console.log("✅ Login realizado com sucesso:", userCredential.user.email);
    fecharLogin();
    alert("✅ Login realizado com sucesso!");
  } catch (error) {
    console.error("Erro no login:", error);
    
    let mensagemErro = "❌ Erro ao fazer login: ";
    switch (error.code) {
      case "auth/user-not-found":
        mensagemErro += "Usuário não encontrado.";
        break;
      case "auth/wrong-password":
        mensagemErro += "Senha incorreta.";
        break;
      case "auth/invalid-email":
        mensagemErro += "Email inválido.";
        break;
      case "auth/user-disabled":
        mensagemErro += "Conta desabilitada.";
        break;
      default:
        mensagemErro += error.message;
    }
    
    alert(mensagemErro);
  }
}

// =============================
// FAZER LOGOUT
// =============================

async function fazerLogout() {
  try {
    await firebase.auth().signOut();
    alert("✅ Logout realizado com sucesso!");
  } catch (error) {
    console.error("Erro no logout:", error);
    alert("❌ Erro ao fazer logout: " + error.message);
  }
}

// =============================
// MOSTRAR MENSAGEM DE LOGIN
// =============================

function mostrarMensagemLogin() {
  document.getElementById("tbody-historico").innerHTML = `
    <tr>
      <td colspan="5" style="text-align: center; padding: 40px;">
        <div class="empty-state">
          <div class="empty-state-icon">🔐</div>
          <p>Faça login para ver seu histórico financeiro</p>
          <button class="btn btn-primary" onclick="mostrarLogin()" style="margin-top: 15px;">
            🔐 Fazer Login
          </button>
        </div>
      </td>
    </tr>
  `;
}
