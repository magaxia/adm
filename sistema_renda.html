<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Renda Diária - Magaxia</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .status {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .btn {
      background: linear-gradient(135deg, #39c6ff, #b84cff);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: block;
      width: 100%;
      margin: 10px 0;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(57, 198, 255, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .log {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }

    .log-entry {
      margin: 5px 0;
      padding: 5px;
      border-radius: 5px;
    }

    .log-success {
      background: rgba(40, 167, 69, 0.2);
      color: #d4edda;
    }

    .log-error {
      background: rgba(220, 53, 69, 0.2);
      color: #f8d7da;
    }

    .log-info {
      background: rgba(23, 162, 184, 0.2);
      color: #d1ecf1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #39c6ff;
      margin: 5px 0;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>💰 Sistema de Renda Diária</h1>

  <div class="status" id="status">
    <h3>Status: Inicializando...</h3>
    <p>Conectando ao Firebase Firestore...</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Compras Ativas</div>
      <div class="stat-value" id="compras-ativas">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ganhos Hoje</div>
      <div class="stat-value" id="ganhos-hoje">R$ 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Última Execução</div>
      <div class="stat-value" id="ultima-execucao">--:--</div>
    </div>
  </div>

  <button class="btn" id="btn-executar" onclick="executarRendaDiaria()">
    🚀 Executar Renda Diária
  </button>

  <button class="btn" onclick="voltar()" style="background: rgba(255,255,255,0.2);">
    ← Voltar ao Painel
  </button>

  <div class="log" id="log">
    <div class="log-entry log-info">Sistema inicializado - aguardando execução...</div>
  </div>

</div>

<script>

// =============================
// CONFIGURAÇÃO FIREBASE
// =============================

const firebaseConfig = {
  apiKey: "AIzaSyAcVPgUHbL4N9U1-H68klmGKWQF-YGleyc",
  authDomain: "vastbitloud-2872a.firebaseapp.com",
  projectId: "vastbitloud-2872a"
};

let db = null;

// =============================
// INICIALIZAR FIREBASE
// =============================

function inicializarFirebase() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.firestore();

    atualizarStatus("✅ Firebase conectado", "Sistema pronto para execução");
    carregarEstatisticas();

  } catch (error) {
    atualizarStatus("❌ Erro Firebase", error.message);
    console.error("Erro Firebase:", error);
  }
}

// =============================
// ATUALIZAR STATUS
// =============================

function atualizarStatus(titulo, mensagem) {
  document.getElementById("status").innerHTML = `
    <h3>${titulo}</h3>
    <p>${mensagem}</p>
  `;
}

// =============================
// CARREGAR ESTATÍSTICAS
// =============================

async function carregarEstatisticas() {
  try {
    // Contar compras ativas
    const comprasAtivas = await db.collection("compras")
      .where("status", "==", "ativo")
      .get();

    document.getElementById("compras-ativas").textContent = comprasAtivas.size;

    // Calcular ganhos de hoje
    const hoje = new Date();
    const inicioHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
    const fimHoje = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate() + 1);

    const ganhosHoje = await db.collection("ganhos")
      .where("data", ">=", inicioHoje)
      .where("data", "<", fimHoje)
      .get();

    let totalHoje = 0;
    ganhosHoje.forEach(doc => {
      totalHoje += doc.data().valor || 0;
    });

    const formatador = new Intl.NumberFormat("pt-BR", {
      style: "currency",
      currency: "BRL"
    });

    document.getElementById("ganhos-hoje").textContent = formatador.format(totalHoje);

    // Última execução (simulado)
    const agora = new Date().toLocaleTimeString("pt-BR", {
      hour: '2-digit',
      minute: '2-digit'
    });
    document.getElementById("ultima-execucao").textContent = agora;

  } catch (error) {
    console.error("Erro ao carregar estatísticas:", error);
  }
}

// =============================
// EXECUTAR RENDA DIÁRIA
// =============================

async function executarRendaDiaria() {
  const btn = document.getElementById("btn-executar");
  btn.disabled = true;
  btn.textContent = "⏳ Executando...";

  atualizarStatus("⏳ Executando", "Processando renda diária...");
  adicionarLog("info", "Iniciando processamento de renda diária...");

  try {
    const hoje = new Date();
    adicionarLog("info", `Data de processamento: ${hoje.toLocaleString("pt-BR")}`);

    const snapshot = await db.collection("compras")
      .where("status", "==", "ativo")
      .get();

    adicionarLog("info", `Encontradas ${snapshot.size} compras ativas`);

    let processadas = 0;
    let finalizadas = 0;
    let totalPago = 0;

    for (const doc of snapshot.docs) {
      const compra = doc.data();

      // Verificar se o timestamp existe
      if (!compra.inicio) {
        adicionarLog("error", `Compra ${doc.id} sem data de início - pulando`);
        continue;
      }

      const inicio = compra.inicio.toDate();
      const diasPassados = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));

      if (diasPassados < compra.ciclo) {
        // Ainda dentro do ciclo - pagar renda
        const uid = compra.uid;
        const renda = compra.rendaDiaria;

        const userRef = db.collection("users").doc(uid);

        await db.runTransaction(async (t) => {
          const userDoc = await t.get(userRef);
          const saldoAtual = userDoc.data().saldo || 0;
          const novoSaldo = saldoAtual + renda;

          t.update(userRef, {
            saldo: novoSaldo
          });
        });

        // Registrar ganho
        await db.collection("ganhos").add({
          uid: uid,
          valor: renda,
          produto: compra.produto,
          data: new Date()
        });

        processadas++;
        totalPago += renda;

        adicionarLog("success", `✅ ${compra.produto} - UID: ${uid} - R$ ${renda.toFixed(2)}`);

      } else {
        // Ciclo terminado - finalizar compra
        await doc.ref.update({
          status: "finalizado"
        });

        finalizadas++;
        adicionarLog("info", `🏁 ${compra.produto} - Ciclo finalizado (${compra.ciclo} dias)`);
      }
    }

    const formatador = new Intl.NumberFormat("pt-BR", {
      style: "currency",
      currency: "BRL"
    });

    atualizarStatus("✅ Concluído", `Processamento finalizado com sucesso!`);
    adicionarLog("success", `📊 Resumo: ${processadas} pagamentos, ${finalizadas} finalizados, ${formatador.format(totalPago)} total`);

    // Recarregar estatísticas
    await carregarEstatisticas();

  } catch (error) {
    atualizarStatus("❌ Erro", "Falha no processamento: " + error.message);
    adicionarLog("error", `Erro: ${error.message}`);
    console.error("Erro:", error);
  }

  btn.disabled = false;
  btn.textContent = "🚀 Executar Renda Diária";
}

// =============================
// UTILITÁRIOS
// =============================

function adicionarLog(tipo, mensagem) {
  const log = document.getElementById("log");
  const timestamp = new Date().toLocaleTimeString("pt-BR");
  const entry = document.createElement("div");
  entry.className = `log-entry log-${tipo}`;
  entry.textContent = `[${timestamp}] ${mensagem}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function voltar() {
  window.location.href = "index.html";
}

// =============================
// INICIAR
// =============================

inicializarFirebase();

</script>

</body>
</html>
