<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Aprovar Depósitos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2,#f093fb);
min-height:100vh;
margin:0;
padding:20px;
color:white;
}

h1{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.aprovar{
background:#00c853;
color:white;
}

.rejeitar{
background:#d50000;
color:white;
}

.info{
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>🛠️ ADMIN - DEPÓSITOS</h1>

<div id="lista"></div>

</div>

<script>

const firebaseConfig={
apiKey:"AIzaSyAcVPgUHbL4N9U1-H68klmGKWQF-YGleyc",
authDomain:"vastbitloud-2872a.firebaseapp.com",
projectId:"vastbitloud-2872a"
};

if(!firebase.apps.length)
firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

const lista=document.getElementById("lista");

// ESCUTAR DEPÓSITOS PENDENTES

function escutarDepositos(){

 db.collection("depositos")
 .where("status","==","pendente")
 .orderBy("data","desc")
 .onSnapshot(snapshot=>{

 lista.innerHTML="";

 if(snapshot.empty){

 lista.innerHTML="<p>Nenhum depósito pendente</p>";
 return;

 }

 snapshot.forEach(doc=>{

 const d=doc.data();

 const div=document.createElement("div");
 div.className="card";

 div.innerHTML=`
 <div class="info">
 <b>UID:</b> ${d.uid}<br>
 <b>Valor:</b> R$ ${d.valor}<br>
 </div>
 
 <div>
 <button class="aprovar" onclick="aprovar('${doc.id}')">
 Aprovar
 </button>
 
 <button class="rejeitar" onclick="rejeitar('${doc.id}')">
 Rejeitar
 </button>
 </div>
 `;

 lista.appendChild(div);

 });

 });

}

// APROVAR DEPÓSITO

async function aprovar(id){

 try{

 await db
 .collection("depositos")
 .doc(id)
 .update({

 status:"aprovado"

 });

 alert("Depósito aprovado");

 }

 catch(e){

 alert("Erro: "+e.message);

 }

}

// REJEITAR DEPÓSITO

async function rejeitar(id){

 try{

 await db
 .collection("depositos")
 .doc(id)
 .update({

 status:"rejeitado"

 });

 alert("Depósito rejeitado");

 }

 catch(e){

 alert("Erro: "+e.message);

 }

}

// LOGIN (SIMPLIFICADO)

auth.onAuthStateChanged(user=>{

 if(!user){

 location.href="login.html";
 return;

 }

 escutarDepositos();

});

</script>

</body>
</html>
